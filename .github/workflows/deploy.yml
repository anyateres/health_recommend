name: Deploy to Cloud Run and Firebase

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: health-recommend
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Authenticate to Google Cloud (OIDC)
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
    
    - name: Set GCP Project
      run: gcloud config set project ${{ env.PROJECT_ID }}
    
    - name: Build and Push to Artifact Registry
      run: |
        set -euo pipefail

        BUILD_ID=$(gcloud builds submit \
          --config=cloudbuild.yaml \
          --region="$REGION" \
          --async \
          --format='value(id)')

        if [ -z "$BUILD_ID" ]; then
          echo "Failed to resolve BUILD_ID from gcloud output"
          exit 1
        fi

        echo "Submitted build: $BUILD_ID"

        while true; do
          STATUS=$(gcloud builds describe "$BUILD_ID" --region="$REGION" --format='value(status)')
          echo "Build status: $STATUS"

          if [ "$STATUS" = "SUCCESS" ]; then
            echo "Build completed successfully"
            break
          fi

          if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "EXPIRED" ]; then
            echo "Build failed with status: $STATUS"
            exit 1
          fi

          sleep 10
        done
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy $SERVICE_NAME \
          --image us-central1-docker.pkg.dev/$PROJECT_ID/health-recommend/$SERVICE_NAME:latest \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated \
          --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
          --memory 512Mi \
          --cpu 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: package-lock.json
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Build frontend
      working-directory: frontend
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
    
    # Uncomment when Firebase is configured:
    # - name: Deploy to Firebase
    #   uses: FirebaseExtended/action-hosting-deploy@v0
    #   with:
    #     repoToken: '${{ secrets.GITHUB_TOKEN }}'
    #     firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
    #     channelId: live
    #     projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
